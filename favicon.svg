<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded square in deep forest green -->
  <rect width="64" height="64" rx="12" fill="#1e3d2f"/>

  <!-- Subtle inner gradient for depth -->
  <rect width="64" height="64" rx="12" fill="url(#grad)" opacity="0.4"/>

  <defs>
    <radialGradient id="grad" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Gold italic 'M' monogram - serif style matching Cormorant Garamond -->
  <text x="32" y="46"
        font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif"
        font-size="42"
        font-style="italic"
        font-weight="500"
        fill="#c9a96e"
        text-anchor="middle"
        letter-spacing="-1">M</text>

  <!-- Small gold accent dot - echoes the dividers used throughout the site -->
  <circle cx="51" cy="51" r="2" fill="#c9a96e" opacity="0.85"/>
</svg>
